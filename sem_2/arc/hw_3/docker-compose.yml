services:
  app1:
    build: ./app1
    container_name: app1
    expose:
      - "8000"
    #ports: # Для проверки работы 1 приложения через localhost
      #- "8000:8000"
    environment:
      DEBUG: "True"
      PORT: 8000
    networks:
      - app-network

  app2:
   build: ./app2
   ports:
     - "8001:8001"
   environment:
     APP1_HOST: app1
     APP1_PORT: 8000
     PORT: 8001
   depends_on:
     - app1
   networks:
       - app-network

networks:
  app-network:
    driver: bridge