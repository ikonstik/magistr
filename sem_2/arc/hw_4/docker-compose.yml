services:

  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app_network

  producer:
    build:
      context: .
      dockerfile: app1/Dockerfile
    container_name: producer_app
    ports:
      - "8000:8000"
    depends_on:
      - kafka
    environment:
      KAFKA_SERVER: kafka:9092
    networks:
      - app_network
    volumes:
      - ./database:/app/database

  consumer:
    build:
      context: .
      dockerfile: app2/Dockerfile
    container_name: consumer_app
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:pass@postgres:5432/postgres
      KAFKA_SERVER: kafka:9092
    networks:
      - app_network
    volumes:
      - ./database:/app/database
    command: >
      sh -c "
      python -c 'import asyncio; from database.db_app import init_db; asyncio.run(init_db())' &&
      uvicorn consumer:consumer_app --host 0.0.0.0 --port 8001
      "

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge