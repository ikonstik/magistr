services:
  # PostgreSQL для Admin Service
  admin_db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${ADMIN_DB_USER}
      POSTGRES_PASSWORD: ${ADMIN_DB_PASSWORD}
      POSTGRES_DB: ${ADMIN_DB_NAME}
    volumes:
      - admin_db_data:/var/lib/postgresql/data
      - ./admin_service/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${ADMIN_DB_PORT}:5432"
    networks:
      - bulb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ADMIN_DB_USER} -d ${ADMIN_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL для Product Service
  product_db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POSTGRES_DB: ${PRODUCT_DB_NAME}
    volumes:
      - product_db_data:/var/lib/postgresql/data
      - ./product_service/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bulb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USER} -d ${PRODUCT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL для Order Service
  order_db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_DB: ${ORDER_DB_NAME}
    volumes:
      - order_db_data:/var/lib/postgresql/data
      - ./order_service/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bulb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_DB_USER} -d ${ORDER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Admin Service (только аутентификация)
  admin_service:
    build: ./admin_service
    ports:
      - "${ADMIN_SERVICE_PORT}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${ADMIN_DB_USER}:${ADMIN_DB_PASSWORD}@admin_db:5432/${ADMIN_DB_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
    depends_on:
      admin_db:
        condition: service_healthy
    volumes:
      - ./admin_service/app:/app
    networks:
      - bulb_network
    restart: unless-stopped

  # Product Service
  product_service:
    build: ./product_service
    ports:
      - "${PRODUCT_SERVICE_PORT}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${PRODUCT_DB_USER}:${PRODUCT_DB_PASSWORD}@product_db:5432/${PRODUCT_DB_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    depends_on:
      product_db:
        condition: service_healthy
      admin_service:
        condition: service_started
    networks:
      - bulb_network
    restart: unless-stopped

  # Order Service
  order_service:
    build: ./order_service
    ports:
      - "${ORDER_SERVICE_PORT}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${ORDER_DB_USER}:${ORDER_DB_PASSWORD}@order_db:5432/${ORDER_DB_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      PRODUCT_SERVICE_URL: http://product_service:${PRODUCT_SERVICE_INTERNAL_PORT}
    depends_on:
      order_db:
        condition: service_healthy
      product_service:
        condition: service_started
    networks:
      - bulb_network
    restart: unless-stopped

volumes:
  admin_db_data:
  product_db_data:
  order_db_data:

networks:
  bulb_network:
    driver: bridge